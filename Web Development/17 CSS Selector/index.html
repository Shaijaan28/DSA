<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selector</title>
    <style>
        /* element selector */
        /* div{
            background-color: red;
        } */
         /* Class selector */
         .red{
            background-color: red;
         }
         /* ID selector */
         #green{
            background-color: green;
         }
         /* Child Selector */
         div>p{
            color: blue;
            background-color: brown;
         }
         /* Desendant Selector */
         div p{
            color: blue;
            background-color: brown;
         }

         /* univarsasl selector */
         *{
            margin:0;
            padding: 0; 
         }

         /* Pseudo Selector */
         

        
    </style>
</head>
<body>
    <div class="red">
        I am a div
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Perspiciatis, ab.</p>
    </div>

    <div id="green">
        i am another div
    </div>

    /* <div>
        <a href="https://www.google.com">Go to Google</a>
    </div> */


</body>
</html>
