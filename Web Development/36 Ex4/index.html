<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Multicolor Website</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=SUSE+Mono:ital,wght@0,100..800;1,100..800&display=swap');
    </style>
    <style>
        /* :root{
            --primary-color:#2be2de94;
            --text-color: white;
            --secondary-color: #29ccc94d;
        } */

        :root {
            --primary-color: #1029ead7;
            --text-color: white;
            --secondary-color: #4c40f34d;
        }

        body {
            background-color: var(--secondary-color);
        }

        * {
            margin: 0;
            padding: 0;
        }

        nav {
            background-color: var(--primary-color);
            padding: 12px 0;

        }

        ul li {
            list-style: none;
            display: inline;
            padding: 23px;
            font-weight: bolder;
            color: var(--text-color);
        }

        ul li a {
            color: var(--text-color);
            text-decoration: none;

        }
    </style>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="/">Home</a></li>
                <li><a href="/">Address</a></li>
                <li><a href="/">Contact</a></li>
                <li><a href="/">Age</a></li>

            </ul>
        </nav>
    </header>

</body>

</html>
