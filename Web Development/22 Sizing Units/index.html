<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sizing Units</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            box-sizing: border-box;
          border: 2px solid black;
          /* width: 2048px; */
          width: 80vw;
          height: 10vh;
          margin: auto;

          background-color: aquamarine;  
        }
        .container{
              box-sizing: border-box;
          border: 2px solid black;
          /* width: 2048px; */
          width: 80vw;
          /* height: 80vh; */
          min-height: 80vh;
          margin: 23px auto;
          font-size: 18px;

          background-color: aquamarine;  
        }
        .container p{
            font-style:1em;
            /* width: 50%; */

        }
        .mycont{
            background-color: red;
            color: yellow;
            font-size: 22px;
            width: 100vmin;
        }
    </style>
</head>
<body>
    <div class="box">
     This is a box   
    </div>
    <div class="container">
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Fuga nesciunt consequatur esse illum aut, sint, optio commodi magnam ipsum praesentium quibusdam odio, velit voluptate porro maiores unde tempora aliquam neque. Sed earum cumque neque quas.</p>
        <p>lorem1000
        </p>
    </div>
    <div class="mycont">this is my cont</div>
</body>
</html>
