<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>Form to apply for scholarship </h1>
    <div>
        <label for="username">Enter username</label>
        <input type="text" name="username" id="username" placeholder="Enter your name">

        <label for="username">Class</label>
        <input type="number" name="Class" id="username" placeholder="Enter your class">   
    </div>

    <div>
         <label for="male">Male</label>
        <input type="radio" name="gender" id="male" value="male">
        <label for="female">Female</label>
        <input type="radio" name="gender" id="female" value="female">
    </div>

    <div>
        <input type="checkbox" value="yes" id="subscribe">
        <label for="subscribe">I read all T&C</label>
    </div>

    <div>
        <label for="comment">Enter your comment</label>
        <br>
        <textarea name="comment" id="comment" rows="4" cols="50"></textarea>
    </div>

    <div>
        <select name="category" id="">
           <option value="general">General</option> 
           <option value="bc 1">BC 1</option> 
           <option value="bc 2">BC 2</option> 
           <option value="st">ST</option> 
           <option value="sc">SC</option> 
        </select>
    </div>
</body>
</html>
